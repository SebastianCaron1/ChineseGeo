<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>China Regions — Memory Game</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#B5251A;--red2:#921E15;--gold:#C89B3C;
  --ink:#141420;--ink2:#1C1C2E;--ink3:#252538;
  --mist:#F2EFE8;--mist2:#E7E3D8;--white:#FDFCF9;
  --text:#141420;--sub:#6A6A82;--border:rgba(20,20,32,.09);
  --r:12px;--sh:0 2px 20px rgba(20,20,32,.09)
}
body{font-family:'DM Sans',sans-serif;background:var(--mist);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* Header */
header{background:var(--ink);height:56px;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:.6rem}
.logo-ch{font-family:'Noto Serif SC',serif;font-size:1.55rem;color:var(--gold);line-height:1}
.logo-title{font-size:.98rem;font-weight:600;color:#fff}
.logo-sub{font-size:.6rem;color:rgba(255,255,255,.32);letter-spacing:.1em;text-transform:uppercase;display:block}
.scores{display:flex;gap:0}
.sc{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 .85rem;border-left:1px solid rgba(255,255,255,.06);min-width:52px}
.sc-v{font-size:1.2rem;font-weight:600;color:var(--gold);line-height:1}
.sc-l{font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.28);margin-top:2px}

/* Tabs */
.tabs{background:var(--ink2);display:flex;justify-content:center;padding:.5rem .75rem;gap:.25rem;border-bottom:1px solid rgba(255,255,255,.04)}
.tab{background:transparent;border:1.5px solid transparent;color:rgba(255,255,255,.38);font-family:'DM Sans',sans-serif;font-size:.77rem;font-weight:500;padding:.35rem .95rem;border-radius:7px;cursor:pointer;letter-spacing:.04em;transition:all .14s}
.tab:hover{color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.12)}
.tab.active{background:var(--red);color:#fff;border-color:var(--red)}

/* Main */
main{flex:1;display:flex;flex-direction:column;align-items:center;padding:1.25rem 1rem 3rem;gap:1.1rem}

/* Map card */
.map-card{width:100%;max-width:920px;background:var(--white);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;position:relative}
#cmap{width:100%;display:block;cursor:default}
.region{transition:fill .2s,opacity .2s;stroke:#fff;stroke-width:.4;stroke-linejoin:round;cursor:pointer}
.region:hover{opacity:.78}
.region.correct{fill:#27AE60!important;stroke:#1d7a45;stroke-width:1}
.region.wrong{fill:#E74C3C!important;stroke:#a93226;stroke-width:1;animation:shk .35s}
.region.target{stroke:var(--gold)!important;stroke-width:1.8}
.region.dimmed{opacity:.28;pointer-events:none}
@keyframes shk{0%,100%{transform:translateX(0)}30%{transform:translateX(-3px)}70%{transform:translateX(3px)}}

/* Tooltip */
#tip{position:absolute;background:var(--ink);color:#fff;font-size:.73rem;font-weight:500;padding:.28rem .65rem;border-radius:5px;pointer-events:none;opacity:0;transition:opacity .1s;white-space:nowrap;z-index:20;transform:translate(-50%,-130%)}

/* Progress */
.prog-row{width:100%;max-width:920px;display:flex;align-items:center;gap:.75rem}
.prog-track{flex:1;height:5px;background:var(--mist2);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:var(--red);border-radius:99px;transition:width .35s}
.prog-lbl{font-size:.7rem;color:var(--sub);white-space:nowrap;min-width:56px;text-align:right}

/* Question panel */
.qpanel{width:100%;max-width:920px;background:var(--white);border-radius:var(--r);box-shadow:var(--sh);padding:1.3rem 1.7rem;display:flex;flex-direction:column;gap:.8rem}
.qlabel{font-size:.62rem;text-transform:uppercase;letter-spacing:.12em;color:var(--sub);font-weight:600}
.qmain{display:flex;align-items:baseline;gap:.65rem;flex-wrap:wrap}
.qname{font-size:1.45rem;font-weight:600}
.qchar{font-family:'Noto Serif SC',serif;font-size:1.45rem;color:var(--red)}
.qmeta{font-size:.78rem;color:var(--sub)}
.qfb{font-size:.86rem;color:var(--sub);min-height:1.35rem;line-height:1.5}
.qfb.ok{color:#1a5e32;font-weight:500}
.qfb.bad{color:#7b241c;font-weight:500}

/* Options */
.opts{display:grid;grid-template-columns:1fr 1fr;gap:.55rem}
.opt{background:var(--mist);border:1.5px solid var(--border);border-radius:8px;padding:.65rem .9rem;font-family:'DM Sans',sans-serif;font-size:.86rem;font-weight:500;color:var(--text);cursor:pointer;text-align:left;transition:background .12s,border-color .12s;display:flex;align-items:center;gap:.45rem}
.opt:hover:not(:disabled){background:var(--mist2);border-color:var(--red)}
.opt.ok{background:#EAFAF1;border-color:#27AE60;color:#1a5e32}
.opt.bad{background:#FDEDEC;border-color:#E74C3C;color:#7b241c}
.opt:disabled{cursor:default}
.opt-ch{font-family:'Noto Serif SC',serif;color:var(--red);font-size:.95rem}

/* Flashcard */
.fc-wrap{width:100%;max-width:540px;display:flex;flex-direction:column;align-items:center;gap:.9rem}
.fc-ctr{font-size:.76rem;color:var(--sub)}
.fc{width:100%;min-height:230px;perspective:1000px;cursor:pointer}
.fc-inner{position:relative;width:100%;min-height:230px;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.fc-inner.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;background:var(--white);border-radius:var(--r);box-shadow:var(--sh);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 2.5rem;gap:.55rem;text-align:center}
.fc-back{transform:rotateY(180deg)}
.fc-ch{font-family:'Noto Serif SC',serif;font-size:3.2rem;color:var(--red)}
.fc-title{font-size:1.4rem;font-weight:600}
.fc-info{font-size:.83rem;color:var(--sub);line-height:1.55}
.fc-hint{font-size:.62rem;color:rgba(106,106,130,.55);text-transform:uppercase;letter-spacing:.1em;margin-top:auto}
.fc-badge{font-size:.63rem;text-transform:uppercase;letter-spacing:.07em;padding:.2rem .55rem;border-radius:5px;font-weight:600}
.fc-nav{display:flex;gap:.65rem}
.fc-nav button{background:var(--white);border:1.5px solid var(--border);border-radius:8px;padding:.42rem 1.3rem;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;cursor:pointer;transition:background .12s,border-color .12s}
.fc-nav button:hover{background:var(--mist2);border-color:rgba(20,20,32,.2)}

/* Learn */
.learn-sec{width:100%;max-width:920px}
.learn-sh{font-size:.62rem;text-transform:uppercase;letter-spacing:.12em;color:var(--sub);font-weight:600;margin-bottom:.65rem;padding-left:.1rem}
.learn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:.65rem;margin-bottom:1.4rem}
.lc{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:.95rem 1.05rem;transition:box-shadow .14s,border-color .14s}
.lc:hover{box-shadow:var(--sh);border-color:rgba(20,20,32,.2)}
.lc-top{display:flex;justify-content:space-between;align-items:flex-start}
.lc-name{font-weight:600;font-size:.9rem}
.lc-ch{font-family:'Noto Serif SC',serif;font-size:1.45rem;color:var(--red)}
.lc-type{font-size:.6rem;text-transform:uppercase;letter-spacing:.07em;color:var(--sub);margin-top:.12rem}
.lc-cap{font-size:.76rem;color:var(--sub);margin-top:.45rem}
.lc-fact{font-size:.73rem;color:var(--sub);margin-top:.28rem;line-height:1.45}

/* Result overlay */
#overlay{display:none;position:fixed;inset:0;background:rgba(20,20,32,.65);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center}
#overlay.show{display:flex}
.rbox{background:var(--white);border-radius:18px;padding:2.8rem 2.4rem;text-align:center;max-width:350px;width:90%;box-shadow:0 24px 80px rgba(20,20,32,.28);display:flex;flex-direction:column;gap:.85rem;align-items:center}
.r-emoji{font-size:3.2rem}
.rbox h2{font-size:1.45rem;font-weight:600}
.r-pct{font-size:2.8rem;font-weight:700;color:var(--red);line-height:1}
.r-detail{font-size:.82rem;color:var(--sub)}
.rbox p{font-size:.86rem;color:var(--sub)}
.r-btn{margin-top:.4rem;background:var(--red);color:#fff;border:none;border-radius:9px;padding:.75rem 2.4rem;font-family:'DM Sans',sans-serif;font-size:.92rem;font-weight:600;cursor:pointer;transition:background .14s}
.r-btn:hover{background:var(--red2)}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;height:380px;color:var(--sub);font-size:.88rem;flex-direction:column;gap:.65rem}
.spin{width:32px;height:32px;border:3px solid var(--mist2);border-top-color:var(--red);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:520px){
  .opts{grid-template-columns:1fr}
  .qpanel{padding:1rem 1.1rem}
  .scores .sc:nth-child(3){display:none}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-ch">中</span>
    <div>
      <span class="logo-title">China Regions</span>
      <span class="logo-sub">Geography Memory Game</span>
    </div>
  </div>
  <div class="scores">
    <div class="sc"><span class="sc-v" id="sv-c">0</span><span class="sc-l">Correct</span></div>
    <div class="sc"><span class="sc-v" id="sv-s">0</span><span class="sc-l">Streak</span></div>
    <div class="sc"><span class="sc-v" id="sv-t">0</span><span class="sc-l">Total</span></div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" data-mode="map">Map Quiz</button>
  <button class="tab" data-mode="mc">Multiple Choice</button>
  <button class="tab" data-mode="flash">Flashcards</button>
  <button class="tab" data-mode="learn">Learn All</button>
</div>

<main id="app"></main>

<div id="overlay">
  <div class="rbox">
    <div class="r-emoji" id="r-emoji">🎉</div>
    <h2>Round Complete</h2>
    <div class="r-pct" id="r-pct">—</div>
    <div class="r-detail" id="r-detail"></div>
    <p id="r-msg"></p>
    <button class="r-btn" id="r-btn">Play Again</button>
  </div>
</div>

let mode='map', questions=[], qIdx=0, answered=false;

const $=id=>document.getElementById(id);

function updateScore(){
  $('sv-c').textContent=score.c;
  $('sv-s').textContent=score.s;
  $('sv-t').textContent=score.t;
}
function resetScore(){score={c:0,s:0,t:0};updateScore()}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]]}return b}

// ═══════════════════════════════════════
// D3 MAP BUILDER
// ═══════════════════════════════════════
function buildMap(container, clickable, targetId, onClickFn){
  container.innerHTML='';
  const W=container.clientWidth||880;
  const H=Math.round(W*0.63);

  // D3 projection — Mercator fitted to China's bounds
  const projection=d3.geoMercator().fitSize([W,H],GEOJSON);
  const pathGen=d3.geoPath().projection(projection);

  const svg=d3.select(container).append('svg')
    .attr('id','cmap').attr('viewBox',`0 0 ${W} ${H}`)
    .attr('preserveAspectRatio','xMidYMid meet');

  // Sea background
  svg.append('rect').attr('width',W).attr('height',H).attr('fill','#DAEAF5').attr('rx',0);

  // Tooltip div
  let tip=document.createElement('div');
  tip.id='tip'; container.appendChild(tip);

  // Draw regions
  svg.selectAll('.region')
    .data(GEOJSON.features)
    .enter().append('path')
    .attr('class',d=>{
      const r=regionByFeature(d);
      let c='region';
      if(clickable && r && r.id===targetId) c+=' target';
      return c;
    })
    .attr('d',pathGen)
    .attr('fill',d=>{
      const r=regionByFeature(d);
      return r?r.color:'#D0D0D0';
    })
    .attr('data-id',d=>(regionByFeature(d)||{}).id||'')
    .on('mousemove',function(event,d){
      const r=regionByFeature(d);
      if(!r) return;
      const rect=container.getBoundingClientRect();
      tip.textContent=r.name;
      tip.style.opacity='1';
      tip.style.left=(event.clientX-rect.left)+'px';
      tip.style.top=(event.clientY-rect.top-6)+'px';
    })
    .on('mouseleave',()=>{tip.style.opacity='0'})
    .on('click',function(event,d){
      if(!clickable||answered) return;
      const r=regionByFeature(d);
      if(r && onClickFn) onClickFn(r.id, svg);
    });

  return svg;
}

function regionByFeature(d){
  const pid=String(d.properties?.id||d.id||'');
  return REGIONS.find(r=>r.id===pid)||null;
}

function markRegion(svg, id, cls){
  svg.selectAll('.region').filter(d=>{
    const r=regionByFeature(d);
    return r&&r.id===id;
  }).classed(cls,true);
}

// ═══════════════════════════════════════
// PROGRESS ROW
// ═══════════════════════════════════════
function progRow(idx,total){
  const pct=Math.round((idx/total)*100);
  return `<div class="prog-row">
    <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="prog-lbl">${idx} / ${total}</div>
  </div>`;
}

// ═══════════════════════════════════════
// MAP QUIZ
// ═══════════════════════════════════════
function startMapQuiz(){questions=shuffle(REGIONS);qIdx=0;renderMapQ()}

function renderMapQ(){
  if(qIdx>=questions.length){showResult();return}
  answered=false;
  const tgt=questions[qIdx];
  app.innerHTML=progRow(qIdx,questions.length)+
    `<div class="map-card" id="mc-wrap"></div>
     <div class="qpanel">
       <div class="qlabel">Click the correct region on the map</div>
       <div class="qmain"><span class="qname">${tgt.name}</span><span class="qchar">${tgt.char}</span></div>
       <div class="qmeta">${tgt.type} · Capital: ${tgt.capital} · ${tgt.region} China</div>
       <div class="qfb" id="qfb"></div>
     </div>`;

  const wrap=$('mc-wrap');
  const svg=buildMap(wrap,true,tgt.id,(rid,svg)=>{
    if(answered) return;
    answered=true; score.t++;
    const r=REGIONS.find(x=>x.id===rid);
    const fb=$('qfb');
    if(rid===tgt.id){
      score.c++;score.s++;
      markRegion(svg,rid,'correct');
      fb.textContent='✓ Correct!  '+tgt.facts;
      fb.className='qfb ok';
    } else {
      score.s=0;
      markRegion(svg,rid,'wrong');
      markRegion(svg,tgt.id,'correct');
      fb.textContent=`✗ That was ${r?r.name:'unknown'}. ${tgt.name} is shown in green.`;
      fb.className='qfb bad';
    }
    updateScore();
    setTimeout(()=>{qIdx++;renderMapQ()},2500);
  });
}

function startMC(){questions=shuffle(REGIONS);qIdx=0;renderMCQ()}

function renderMCQ(){
  if(qIdx>=questions.length){showResult();return}
  answered=false;
  const tgt=questions[qIdx];
  const opts=shuffle([tgt,...shuffle(REGIONS.filter(r=>r.id!==tgt.id)).slice(0,3)]);
  app.innerHTML=progRow(qIdx,questions.length)+
    `<div class="map-card" id="mc-wrap"></div>
     <div class="qpanel">
       <div class="qlabel">Which highlighted region is this?</div>
       <div class="opts" id="opts-grid">
         ${opts.map(o=>`<button class="opt" data-id="${o.id}"><span class="opt-ch">${o.char}</span>${o.name}</button>`).join('')}
       </div>
       <div class="qfb" id="qfb"></div>
     </div>`;

  buildMap($('mc-wrap'),false,tgt.id,null);
  // Highlight target after short delay so SVG is rendered
  setTimeout(()=>{
    d3.select('#cmap').selectAll('.region').filter(d=>{
      const r=regionByFeature(d); return r&&r.id===tgt.id;
    }).classed('target',true);
  },60);

  document.querySelectorAll('.opt').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if(answered) return;
      answered=true; score.t++;
      document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
      const chosen=btn.dataset.id;
      const fb=$('qfb');
      if(chosen===tgt.id){
        btn.classList.add('ok'); score.c++;score.s++;
        fb.textContent='✓ Correct!  '+tgt.facts; fb.className='qfb ok';
      } else {
        btn.classList.add('bad'); score.s=0;
        document.querySelectorAll('.opt').forEach(b=>{if(b.dataset.id===tgt.id)b.classList.add('ok')});
        fb.textContent=`✗ Incorrect. The answer was ${tgt.name} (${tgt.char}).`; fb.className='qfb bad';
      }
      updateScore();
      setTimeout(()=>{qIdx++;renderMCQ()},2200);
    });
  });
}

// ═══════════════════════════════════════
// FLASHCARDS
// ═══════════════════════════════════════
function startFlash(){questions=shuffle(REGIONS);fcIdx=0;fcFlipped=false;renderFC()}
function renderFC(){
  const r=questions[fcIdx];
  const tc=TYPE_COLOR[r.type]||'#555';
  app.innerHTML=`<div class="fc-wrap">
    <div class="fc-ctr">${fcIdx+1} of ${questions.length}</div>
    <div class="fc" id="fc-card">
      <div class="fc-inner" id="fc-in">
        <div class="fc-face">
          <div class="fc-ch">${r.char}</div>
          <div class="fc-title">${r.name}</div>
          <span class="fc-badge" style="background:${tc}18;color:${tc}">${r.type}</span>
          <div class="fc-hint">Tap to reveal</div>
        </div>
        <div class="fc-face fc-back">
          <div style="font-size:1.2rem">📍</div>
          <div class="fc-title">${r.capital}</div>
          <div class="fc-info" style="font-size:.72rem;color:var(--sub)">Capital · ${r.region} China</div>
          <div class="fc-info">${r.facts}</div>
          <div class="fc-hint">Tap to flip back</div>
        </div>
      </div>
    </div>
    <div class="fc-nav">
      <button id="fc-p">← Prev</button>
      <button id="fc-n">Next →</button>
    </div>
  </div>`;
  $('fc-card').onclick=()=>{fcFlipped=!fcFlipped;$('fc-in').classList.toggle('flipped',fcFlipped)};
  $('fc-p').onclick=()=>{fcIdx=(fcIdx-1+questions.length)%questions.length;fcFlipped=false;renderFC()};
  $('fc-n').onclick=()=>{fcIdx=(fcIdx+1)%questions.length;fcFlipped=false;renderFC()};
}

// ═══════════════════════════════════════
// LEARN ALL
// ═══════════════════════════════════════
function startLearn(){
  const order=['North','Northeast','East','Central','South','Southwest','Northwest'];
  const emo={North:'🏔',Northeast:'❄',East:'🌊',Central:'🏛',South:'🌴',Southwest:'🐼',Northwest:'🏜'};
  const grp={};
  REGIONS.forEach(r=>{(grp[r.region]=grp[r.region]||[]).push(r)});
  app.innerHTML=order.map(rg=>{
    if(!grp[rg]) return '';
    const tc=r=>TYPE_COLOR[r.type]||'#555';
    return `<div class="learn-sec">
      <div class="learn-sh">${emo[rg]||''} ${rg} China</div>
      <div class="learn-grid">
        ${grp[rg].map(r=>`<div class="lc">
          <div class="lc-top"><div><div class="lc-name">${r.name}</div><div class="lc-type" style="color:${tc(r)}">${r.type}</div></div><div class="lc-ch">${r.char}</div></div>
          <div class="lc-cap">Capital: <strong>${r.capital}</strong></div>
          <div class="lc-fact">${r.facts}</div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════
// RESULT
// ═══════════════════════════════════════
function showResult(){
  const pct=score.t?Math.round(score.c/score.t*100):0;
  const emo=pct>=90?'🏆':pct>=70?'🎉':pct>=50?'📚':'💪';
  const msg=pct>=90?'Exceptional! You know China well.':pct>=70?'Great work — nearly mastered!':pct>=50?'Good effort, keep reviewing!':'Practice makes perfect!';
  $('r-emoji').textContent=emo;
  $('r-pct').textContent=pct+'%';
  $('r-detail').textContent=`${score.c} correct out of ${score.t}`;
  $('r-msg').textContent=msg;
  $('overlay').classList.add('show');
}
$('r-btn').onclick=()=>{$('overlay').classList.remove('show');resetScore();go(mode)};

// ═══════════════════════════════════════
// ROUTING
// ═══════════════════════════════════════
function go(m){
  mode=m;
  if(m==='flash'){startFlash();return}
  if(m==='learn'){startLearn();return}
  if(m==='map')  {startMapQuiz();return}
  if(m==='mc')   {startMC();return}
}

document.querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    resetScore();
    go(tab.dataset.mode);
  });
});

go('map');
</script>
</body>
